name: Validate Adapters

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make validate-adapter.sh executable
        run: chmod +x validate-adapter.sh

      - name: Validate all adapters
        run: |
          failed=0
          for dir in adapters/*/; do
            # Skip shared asset dirs (e.g. shared/) — no adapter.json, not adapters.
            [ -f "${dir}adapter.json" ] || { echo "=== Skipping ${dir} (no adapter.json) ==="; continue; }
            echo "=== Validating ${dir} ==="
            if ! ./validate-adapter.sh "$dir"; then
              echo "FAILED: ${dir}"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more adapters failed validation."
            exit 1
          fi
          echo "All adapters passed validation."

      # canonical-assets.json enumerates the atrium-owned files atrium pushes to
      # user installs beyond per-adapter skills (the home context file, bundled
      # skills, future global assets). atrium reads it at launch + on a periodic
      # cadence to keep those files fresh without a relaunch. A listed file that
      # doesn't exist on disk silently never reaches users — fail the build.
      - name: Validate canonical-assets manifest
        run: |
          manifest=canonical-assets.json
          [ -f "$manifest" ] || { echo "No $manifest; skipping"; exit 0; }
          jq empty "$manifest" || { echo "::error::$manifest is not valid JSON"; exit 1; }
          failed=0
          count=$(jq '.assets | length' "$manifest")
          for i in $(seq 0 $((count - 1))); do
            target=$(jq -r ".assets[$i].target" "$manifest")
            remote=$(jq -r ".assets[$i].remotePath" "$manifest")
            id=$(jq -r ".assets[$i].id // .assets[$i].remotePath" "$manifest")
            if [ ! -f "$remote" ]; then
              echo "::error::canonical-assets '$id': remotePath '$remote' does not exist"
              failed=1
            fi
            case "$target" in
              atrium-home)
                [ -n "$(jq -r ".assets[$i].destName // empty" "$manifest")" ] \
                  || { echo "::error::'$id' target atrium-home requires destName"; failed=1; } ;;
              bundled-skill)
                [ -n "$(jq -r ".assets[$i].skillName // empty" "$manifest")" ] \
                  || { echo "::error::'$id' target bundled-skill requires skillName"; failed=1; } ;;
              *)
                echo "::error::'$id' has unknown target '$target' (expected atrium-home | bundled-skill)"
                failed=1 ;;
            esac
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "canonical-assets.json: all $count assets valid."
